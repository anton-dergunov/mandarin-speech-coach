services:
  mandarin-speech-coach:
    build: .
    ports:
      - "7860:7860"
    environment:
      GRADIO_SERVER_NAME: "0.0.0.0"
      GRADIO_SERVER_PORT: "7860"
    volumes:
      # Optional: persist Hugging Face cache between container restarts
      - hf-cache:/app/.cache/huggingface

volumes:
  hf-cache:
